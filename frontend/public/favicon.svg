<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-glow)" stroke="#00FF7F" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" />

    <circle cx="50" cy="50" r="20" stroke-dasharray="4 8" stroke-width="3" />

    <circle cx="50" cy="50" r="5" fill="#00FF7F" stroke="none" />

    <line x1="50" y1="10" x2="50" y2="20" />
    <line x1="50" y1="80" x2="50" y2="90" />
    <line x1="15" y1="50" x2="25" y2="50" />
    <line x1="75" y1="50" x2="85" y2="50" />
    
  </g>
</svg>
